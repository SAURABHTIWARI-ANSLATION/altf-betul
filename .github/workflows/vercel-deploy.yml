name: Vercel Deploy

on:
  workflow_call:
    inputs:
      target:
        description: Project to deploy
        required: false
        default: all
        type: string
    secrets:
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false
      VERCEL_WEB_PROJECT_ID:
        required: false
      VERCEL_ADMIN_PROJECT_ID:
        required: false
  workflow_dispatch:
    inputs:
      target:
        description: Project to deploy
        required: true
        default: all
        type: choice
        options:
          - all
          - web
          - admin

concurrency:
  group: vercel-deploy-${{ github.ref }}-${{ inputs.target || 'all' }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1
  WEB_PROJECT_ROOT: altftoolweb
  ADMIN_PROJECT_ROOT: altftoolwebadmin

jobs:
  deploy-web:
    name: Deploy web
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.target == 'all' || inputs.target == 'web'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_WEB_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_WEB_PROJECT_ID || secrets.VERCEL_PROJECT_ID }}
      ALTFT_MONITOR_WEB_URLS: ${{ vars.ALTFT_MONITOR_WEB_URLS || vars.ALTFT_MONITOR_WEB_URL || 'https://altftool.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            altftoolweb/package-lock.json
            altftoolwebadmin/package-lock.json

      - name: Check Vercel web secrets
        env:
          VERCEL_READINESS_OUTPUT_PATH: web-vercel-readiness-report.json
        run: npm run deploy:readiness -- --target=web

      - name: Install Vercel CLI
        run: npm install -g vercel@54.0.0

      - name: Install workspace dependencies for post-deploy checks
        run: npm ci

      - name: Pull web production environment
        run: vercel pull --yes --environment=production --cwd "$WEB_PROJECT_ROOT" --token="$VERCEL_TOKEN"

      - name: Build web deployment
        run: vercel build --prod --cwd "$WEB_PROJECT_ROOT" --token="$VERCEL_TOKEN"

      - name: Deploy web prebuilt output
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --cwd "$WEB_PROJECT_ROOT" --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Web deployment"
            echo
            echo "$deployment_url"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Monitor web deployment URL
        env:
          ALTFT_MONITOR_WEB_URLS: ${{ steps.deploy.outputs.url }}
          ALTFT_MONITOR_OUTPUT_PATH: web-deployment-monitoring-report.json
        run: npm run monitor:production

      - name: Monitor production web domain
        env:
          ALTFT_MONITOR_OUTPUT_PATH: web-production-monitoring-report.json
        run: npm run monitor:production

      - name: Upload web monitoring reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-deploy-monitoring-reports
          path: |
            web-vercel-readiness-report.json
            web-deployment-monitoring-report.json
            web-production-monitoring-report.json
          if-no-files-found: ignore

  deploy-admin:
    name: Deploy admin
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: inputs.target == 'all' || inputs.target == 'admin'
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_ADMIN_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            altftoolweb/package-lock.json
            altftoolwebadmin/package-lock.json

      - name: Check Vercel admin secrets
        env:
          VERCEL_READINESS_OUTPUT_PATH: admin-vercel-readiness-report.json
        run: npm run deploy:readiness -- --target=admin

      - name: Install Vercel CLI
        run: npm install -g vercel@54.0.0

      - name: Upload admin readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: admin-deploy-readiness-report
          path: admin-vercel-readiness-report.json
          if-no-files-found: ignore

      - name: Pull admin production environment
        run: vercel pull --yes --environment=production --cwd "$ADMIN_PROJECT_ROOT" --token="$VERCEL_TOKEN"

      - name: Build admin deployment
        run: vercel build --prod --cwd "$ADMIN_PROJECT_ROOT" --token="$VERCEL_TOKEN"

      - name: Deploy admin prebuilt output
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --cwd "$ADMIN_PROJECT_ROOT" --token="$VERCEL_TOKEN" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          {
            echo "### Admin deployment"
            echo
            echo "$deployment_url"
          } >> "$GITHUB_STEP_SUMMARY"
