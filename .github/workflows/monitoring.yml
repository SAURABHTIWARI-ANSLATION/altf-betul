name: Production Monitoring

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: production-monitoring
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            altftoolweb/package-lock.json
            altftoolwebadmin/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run production monitor
        env:
          ALTFT_MONITOR_WEB_URL: ${{ vars.ALTFT_MONITOR_WEB_URL || 'https://altftool.com' }}
          ALTFT_MONITOR_WEB_URLS: ${{ vars.ALTFT_MONITOR_WEB_URLS }}
          ALTFT_MONITOR_ADMIN_URL: ${{ vars.ALTFT_MONITOR_ADMIN_URL }}
          ALTFT_MONITOR_ADMIN_TOKEN: ${{ secrets.ALTFT_MONITOR_ADMIN_TOKEN }}
          ALTFT_MONITOR_REQUIRE_ADMIN: ${{ vars.ALTFT_MONITOR_REQUIRE_ADMIN || 'false' }}
          ALTFT_MONITOR_REQUIRE_ADMIN_AUTH: ${{ vars.ALTFT_MONITOR_REQUIRE_ADMIN_AUTH || 'false' }}
          ALTFT_MONITOR_TIMEOUT_MS: ${{ vars.ALTFT_MONITOR_TIMEOUT_MS || '15000' }}
          ALTFT_MONITOR_OUTPUT_PATH: production-monitoring-report.json
        run: npm run monitor:production

      - name: Upload monitoring report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-monitoring-report
          path: production-monitoring-report.json
          if-no-files-found: ignore
